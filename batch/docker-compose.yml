services:
  patagonia-ubicaciones:
    build: ./patagonia-ubicaciones
    container_name: patagonia-ubicaciones
    volumes:
      - /mnt/SERVER-TFILES/PORTAINER/patagonia-html:/data
    restart: unless-stopped

  patagonia-html:
    image: python:3.12-slim
    container_name: patagonia-html
    working_dir: /app
    environment:
      - DATA_DIR=/data
    volumes:
      - /mnt/SERVER-TFILES/PORTAINER/patagonia-html-app:/app
      - /mnt/SERVER-TFILES/PORTAINER/patagonia-html:/data
    command: >
      sh -lc "pip install --no-cache-dir -r requirements.txt
      && uvicorn web_server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
